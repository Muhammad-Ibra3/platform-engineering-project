image:
  # NOTE: The image is updated by the GitHub Actions pipelines and is deployed via ArgoCD.
  repository: "016257615702.dkr.ecr.us-east-1.amazonaws.com/api-gateway"
  tag: "4648f4b8d196705d4fddacde9e5365d36d9b7ca3"
ingress:
  enabled: true
  className: "traefik"
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-route53-dns01
    external-dns.alpha.kubernetes.io/target: "18.234.67.136"
  hosts:
    - host: preview-6.preview.myplatformproject.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: preview-6-tls
      hosts:
        - preview-6.preview.myplatformproject.com
env:
  HTTP_PORT: ":5001"
  LOG_LEVEL: "debug"
  KAFKA_BROKERS: "kafka.message-broker.svc.cluster.local:9092"
  PROMETHEUS_URL: "http://prometheus-server.observability.svc.cluster.local"
  READER_SERVICE: "reader.dev-microservices.svc.cluster.local:5003"
service:
  port: 5001
  targetPort: 5001
livenessProbe:
  httpGet:
    path: /live
    port: 3001
  initialDelaySeconds: 20
  periodSeconds: 10
  timeoutSeconds: 2
  failureThreshold: 3
readinessProbe:
  httpGet:
    path: /ready
    port: 3001
  initialDelaySeconds: 5
  periodSeconds: 5
  timeoutSeconds: 2
  failureThreshold: 3
startupProbe:
  httpGet:
    path: /live
    port: 3001
  periodSeconds: 5
  timeoutSeconds: 2
  failureThreshold: 24
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 250m
    memory: 256Mi
