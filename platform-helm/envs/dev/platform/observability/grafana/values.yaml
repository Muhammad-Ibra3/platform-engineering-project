image:
  repository: grafana/grafana
  tag: 11.2.0
  digest: ""

admin:
  existingSecret: grafana-admin

persistence:
  enabled: true
  size: 1Gi
  storageClassName: gp3

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 2
  targetCPU: "70"

resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 300m
    memory: 256Mi
