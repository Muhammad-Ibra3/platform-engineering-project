server:
  image:
    repository: quay.io/prometheus/prometheus
    tag: v2.54.1
    digest: ""
  persistentVolume:
    enabled: true
    size: 2Gi

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 1Gi

alertmanager:
  image:
    repository: quay.io/prometheus/alertmanager
    tag: v0.27.0
  persistentVolume:
    enabled: true
    size: 1Gi
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 300m
      memory: 256Mi