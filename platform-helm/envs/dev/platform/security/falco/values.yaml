image:
  repository: falcosecurity/falco
  tag: "0.43.0"

falco:
  grpc:
    enabled: true
  rules_files:
    - /etc/falco/falco_rules.yaml
    - /etc/falco/falco_rules.local.yaml
    - /etc/falco/rules.d

falcosidekick:
  enabled: true
  webui:
    enabled: true
    ingress:
      enabled: true
      ingressClassName: traefik
      annotations:
        cert-manager.io/cluster-issuer: letsencrypt-route53-dns01
        external-dns.alpha.kubernetes.io/target: "18.234.67.136"
      hosts:
        - host: falco-sidekick.dev.myplatformproject.com
          paths:
            - path: /
      tls:
        - secretName: falco-sidekick-dev-myplatformproject-com-tls
          hosts:
            - falco-sidekick.dev.myplatformproject.com

customRules: {}

resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 300m
    memory: 256Mi

metrics:
  enabled: true

healthChecks:
  startupProbe:
    initialDelaySeconds: 5
    timeoutSeconds: 5
    periodSeconds: 5
    failureThreshold: 24
  livenessProbe:
    initialDelaySeconds: 10
    timeoutSeconds: 5
    periodSeconds: 15
    failureThreshold: 3
  readinessProbe:
    initialDelaySeconds: 5
    timeoutSeconds: 5
    periodSeconds: 10
    failureThreshold: 3