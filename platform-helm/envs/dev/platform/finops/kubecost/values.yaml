global:
  clusterId: dev-k3s
  prometheus:
    enabled: false
    fqdn: http://prometheus-server.observability.svc.cluster.local
    insecureSkipVerify: false
  federatedStorage:
    config: |-
      type: S3
      config:
        bucket: dev-kubecost-store-platform-engineering-project
        endpoint: s3.amazonaws.com
        region: us-east-1
        insecure: false

prometheus:
  server:
    global:
      external_labels:
        cluster_id: dev-k3s

kubecostModel:
  image: "gcr.io/kubecost1/cost-model"
  resources:
    requests:
      cpu: 25m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 512Mi
  readinessProbe:
    enabled: true
    initialDelaySeconds: 10
    periodSeconds: 10
    failureThreshold: 10
  livenessProbe:
    enabled: true
    initialDelaySeconds: 20
    periodSeconds: 10
    failureThreshold: 10

kubecostFrontend:
  image: "gcr.io/kubecost1/frontend"
  resources:
    requests:
      cpu: 25m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 512Mi
  readinessProbe:
    enabled: true
    initialDelaySeconds: 5
    periodSeconds: 10
    failureThreshold: 10
  livenessProbe:
    enabled: true
    initialDelaySeconds: 15
    periodSeconds: 10
    failureThreshold: 10

ingress:
  enabled: true
  className: traefik
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-route53-dns01
    external-dns.alpha.kubernetes.io/target: "34.228.167.63"
  hosts:
    - kubecost.dev.myplatformproject.com
  tls:
    - secretName: kubecost-dev-myplatformproject-com-tls
      hosts:
        - kubecost.dev.myplatformproject.com
