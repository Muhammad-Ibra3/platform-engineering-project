installCRDs: true

image:
  repository: quay.io/jetstack/cert-manager-controller
  tag: v1.16.0
  digest: ""

webhook:
  image:
    repository: quay.io/jetstack/cert-manager-webhook
    tag: v1.16.0
    digest: ""
  livenessProbe:
    initialDelaySeconds: 60
    periodSeconds: 10
    timeoutSeconds: 1
    successThreshold: 1
    failureThreshold: 3
  readinessProbe:
    initialDelaySeconds: 10
    periodSeconds: 5
    timeoutSeconds: 1
    successThreshold: 1
    failureThreshold: 3

cainjector:
  image:
    repository: quay.io/jetstack/cert-manager-cainjector
    tag: v1.16.0
    digest: ""

resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 300m
    memory: 256Mi

livenessProbe:
  enabled: true
  initialDelaySeconds: 15
  periodSeconds: 10
  timeoutSeconds: 10
  successThreshold: 1
  failureThreshold: 8
