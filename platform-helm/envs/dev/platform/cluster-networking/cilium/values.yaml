image:
  repository: quay.io/cilium/cilium
  tag: "v1.19.1"

operator:
  replicas: 1
  skipCRDCreation: false
  image:
    repository: quay.io/cilium/operator
    tag: "v1.19.1"
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

crdWaitTimeout: 10m

hubble:
  enabled: true
  relay:
    enabled: true
  ui:
    enabled: true