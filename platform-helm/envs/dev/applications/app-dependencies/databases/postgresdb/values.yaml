image:
  repository: bitnami/postgresql
  tag: "sha256:66ab173e0e1d3139a9c3f9744fea8bc991dde3e2869c5e55df38eb4d12379351"

auth:
  username: app
  database: products
  existingSecret: postgresql-auth

primary:
  persistence:
    enabled: true
    size: 2Gi
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 300m
      memory: 512Mi
  autoscaling:
    enabled: true
    minReplicas: 1
    maxReplicas: 2
    targetCPU: 70

metrics:
  enabled: true
  serviceMonitor:
    enabled: false
