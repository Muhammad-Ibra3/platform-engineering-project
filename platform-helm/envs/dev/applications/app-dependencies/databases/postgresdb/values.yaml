image:
  repository: bitnami/postgresql
  tag: 16.4.0-debian-12-r8
  digest: ""

auth:
  username: app
  database: products
  existingSecret: postgresql-auth

primary:
  persistence:
    enabled: true
    size: 2Gi
    storageClass: gp3
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 300m
      memory: 512Mi
  autoscaling:
    enabled: true
    minReplicas: 1
    maxReplicas: 2
    targetCPU: 70

metrics:
  enabled: true
  serviceMonitor:
    enabled: false
