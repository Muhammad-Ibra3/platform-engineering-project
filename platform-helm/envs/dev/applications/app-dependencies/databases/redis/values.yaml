image:
  repository: bitnami/redis
  tag: "sha256-d5868793c4585162007c8d73648045ffefa2c8b45d05870e3ce2f6d5169063af"

architecture: replication
auth:
  enabled: true
  existingSecret: redis-auth

master:
  persistence:
    enabled: true
    size: 1Gi
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 512Mi

replica:
  replicaCount: 1
  autoscaling:
    enabled: true
    minReplicas: 1
    maxReplicas: 2
    targetCPU: 70
  resources:
    requests:
      cpu: 30m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi

metrics:
  enabled: true
  serviceMonitor:
    enabled: false
