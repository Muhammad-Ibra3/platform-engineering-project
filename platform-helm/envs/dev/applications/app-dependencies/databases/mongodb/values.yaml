image:
  repository: bitnami/mongodb
  tag: "sha256-006fc9a6c5870820b838a4a2f985fb2aef16fdbfa5bd4c33286cab8f0e8aa83e"


architecture: standalone
replicaCount: 1

auth:
  enabled: true
  rootUser: admin
  existingSecret: mongodb-auth

persistence:
  enabled: true
  size: 2Gi

resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 300m
    memory: 512Mi

metrics:
  enabled: true
  serviceMonitor:
    enabled: false

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 2
  targetCPU: 70
