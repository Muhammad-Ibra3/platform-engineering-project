image:
  registry: docker.io
  repository: bitnami/kafka
  tag: 3.3.1-debian-11-r11

kraft:
  enabled: true

controller:
  replicaCount: 1
  persistence:
    enabled: true
    size: 2Gi

broker:
  replicaCount: 1
  persistence:
    enabled: true
    size: 5Gi
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 600m
      memory: 1Gi
  autoscaling:
    enabled: true
    minReplicas: 1
    maxReplicas: 2
    targetCPU: 70

metrics:
  kafka:
    enabled: true
  jmx:
    enabled: true
  serviceMonitor:
    enabled: false
