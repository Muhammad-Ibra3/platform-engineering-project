server:
  image:
    repository: hashicorp/vault
    tag: 1.17.2
  ha:
    enabled: false
  dataStorage:
    enabled: true
    size: 1Gi
    storageClass: gp3
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

injector:
  image:
    repository: hashicorp/vault-k8s
    tag: 1.5.0
