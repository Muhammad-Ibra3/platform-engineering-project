replicaCount: 1
image:
  repository: your-dockerhub-user/api-gateway
  tag: "latest"
  pullPolicy: Always

service:
  type: NodePort
  ports:
    - name: http
      port: 8080
      targetPort: 8080

ingress:
  enabled: true
  className: "traefik"
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web 
  hosts:
    - host: localhost
      paths:
        - path: /
          pathType: Prefix

env:
  PORT: "8080"
  KAFKA_BROKERS: "kafka:9092"
  WRITER_GRPC_PORT: "writer-service:5000"
  READER_GRPC_PORT: "reader-service:5001"

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 250m
    memory: 256Mi