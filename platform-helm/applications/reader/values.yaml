replicaCount: 1
image:
  repository: your-dockerhub-user/reader-service
  tag: "latest"
  pullPolicy: Always

service:
  type: ClusterIP
  ports:
    - name: grpc
      port: 5001
      targetPort: 5001

env:
  GRPC_PORT: "5001"
  KAFKA_BROKERS: "kafka:9092"
  MONGO_URI: "mongodb://mongo:27017"
  MONGO_DB: "reader_db"
  REDIS_ADDR: "redis:6379"

resources:
  requests:
    cpu: 100m
    memory: 128Mi