replicaCount: 3

image:
  tag: "stable"

ingress:
  enabled: true
  className: "traefik"
  hosts:
    - host: api.your-domain.com
      paths:
        - path: /
          pathType: Prefix

env:
  PORT: "8080"
  LOG_LEVEL: "info"
  KAFKA_BROKERS: "kafka.message-broker.svc.cluster.local:9092"
  WRITER_GRPC_PORT: "writer:5000"
  READER_GRPC_PORT: "reader:5001"

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 250m
    memory: 256Mi