replicaCount: 3

image:
  tag: "stable"

env:
  GRPC_PORT: "5000"
  LOG_LEVEL: "info"
  KAFKA_BROKERS: "kafka.message-broker.svc.cluster.local:9092"
  POSTGRES_HOST: "postgresql.database.svc.cluster.local"
  POSTGRES_PORT: "5432"
  POSTGRES_DB: "products"
  POSTGRES_USER: "postgres"

secretEnv:
  POSTGRES_PASSWORD:
    secretName: vault-postgres-credentials
    secretKey: password

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 250m
    memory: 512Mi