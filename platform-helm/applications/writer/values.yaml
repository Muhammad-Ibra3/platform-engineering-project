replicaCount: 1
image:
  repository: your-dockerhub-user/writer-service
  tag: "latest"
  pullPolicy: Always

service:
  type: ClusterIP
  ports:
    - name: grpc
      port: 5000
      targetPort: 5000

env:
  GRPC_PORT: "5000"
  KAFKA_BROKERS: "kafka:9092"
  POSTGRES_HOST: "postgres"
  POSTGRES_PORT: "5432"
  POSTGRES_USER: "postgres"
  POSTGRES_PASSWORD: "PLACEHOLDER"
  POSTGRES_DB: "writer_db"

resources:
  requests:
    cpu: 100m
    memory: 128Mi