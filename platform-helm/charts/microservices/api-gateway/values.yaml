# This is the base values chart for the api-gateway microservice.
# For environment-specific overrides, see the files in the envs directory.

nameOverride: "api-gateway"
fullnameOverride: "api-gateway"

replicaCount: 1
image:
  repository: "016257615702.dkr.ecr.us-east-1.amazonaws.com/api-gateway"
  tag: "latest"
  pullPolicy: Always

service:
  type: NodePort
  ports:
    - name: http
      port: 8080
      targetPort: 8080

ingress:
  # Ingress is disabled by default. Enable and configure in environment-specific overrides as needed.
  enabled: false 

probes:
  liveness:
    path: /health
    port: 8080

env:
  PORT: "8080"
  LOG_LEVEL: "debug"
  KAFKA_BROKERS: "kafka.message-broker.svc.cluster.local:9092"
  WRITER_GRPC_PORT: "writer:5000"
  READER_GRPC_PORT: "reader:5001"

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 250m
    memory: 256Mi
