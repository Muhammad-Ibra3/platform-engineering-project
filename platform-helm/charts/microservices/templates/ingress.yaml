{{- with .Values.ingress }}
{{- if .enabled }}
{{- $servicePorts := $.Values.service.ports | default (list (dict "name" "http" "port" ($.Values.service.port | default 80) "targetPort" ($.Values.service.targetPort | default ($.Values.service.port | default 80)))) -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ $.Release.Name }}
  labels:
    app: {{ $.Release.Name }}
  {{- with .annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .className }}
  ingressClassName: {{ .className }}
  {{- end }}
  rules:
    {{- range .hosts }}
    - host: {{ .host }}
      http:
        paths:
          {{- range .paths }}
          - path: {{ .path }}
            pathType: {{ .pathType }}
            backend:
              service:
                name: {{ $.Release.Name }}
                port:
                  number: {{ (index $servicePorts 0).port }}
          {{- end }}
    {{- end }}
  {{- with .tls }}
  tls:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
{{- end }}
