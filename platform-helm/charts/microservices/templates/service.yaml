apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}
  labels:
    app: {{ .Release.Name }}
{{- $serviceType := .Values.service.type | default "ClusterIP" -}}
{{- $servicePorts := .Values.service.ports | default (list (dict "name" "http" "port" (.Values.service.port | default 80) "targetPort" (.Values.service.targetPort | default (.Values.service.port | default 80)))) -}}
spec:
  type: {{ $serviceType }}
  ports:
    {{- range $servicePorts }}
    - port: {{ .port }}
      targetPort: {{ .targetPort }}
      protocol: TCP
      name: {{ .name }}
    {{- end }}
  selector:
    app: {{ .Release.Name }}