# This is the base values chart for the writer microservice.
# For environment-specific overrides, see the files in the envs directory.

nameOverride: "writer"
fullnameOverride: "writer"

replicaCount: 1
image:
  repository: "016257615702.dkr.ecr.us-east-1.amazonaws.com/writer"
  tag: "latest"
  pullPolicy: Always

service:
  type: ClusterIP
  ports:
    - name: grpc
      port: 5000
      targetPort: 5000

probes:
  liveness:
    path: /health
    port: 5000

env:
  GRPC_PORT: "5000"
  LOG_LEVEL: "debug"
  KAFKA_BROKERS: "kafka.message-broker.svc.cluster.local:9092"
  POSTGRES_HOST: "postgresql.database.svc.cluster.local"
  POSTGRES_PORT: "5432"
  POSTGRES_DB: "products"
  POSTGRES_USER: "postgres"
  REDIS_ADDR: "redis.database.svc.cluster.local:6379"
  MONGO_URI: "mongodb://mongodb.database.svc.cluster.local:27017"

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 250m
    memory: 512Mi