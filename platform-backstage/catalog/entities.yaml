apiVersion: backstage.io/v1alpha1
kind: Group
metadata:
  name: platform-team
  description: Platform engineering owners for the developer portal
spec:
  type: team
  profile:
    displayName: Platform Team
  children: []
---
apiVersion: backstage.io/v1alpha1
kind: User
metadata:
  name: platform-admin
  description: Initial Backstage administrator identity
spec:
  profile:
    displayName: Platform Admin
    email: platform-admin@myplatformproject.com
  memberOf:
    - platform-team
---
apiVersion: backstage.io/v1alpha1
kind: Location
metadata:
  name: platform-services
  description: Seed catalog entries for initial platform services
spec:
  type: url
  targets:
    - https://raw.githubusercontent.com/Muhammad-Ibra3/platform-engineering-project/main/platform-backstage/catalog/services.yaml
