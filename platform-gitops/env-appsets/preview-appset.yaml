apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: preview-environments
  namespace: argocd
spec:
  generators:
    - matrix:
        generators:
          - git:
              repoURL: 'https://github.com/Muhammad-Ibra3/platform-engineering-project.git'
              revision: main
              directories:
                - path: platform-gitops/envs/preview/*
          - list:
              elements:
                - service: api-gateway
                - service: reader
                - service: writer
  template:
    metadata:
      name: '{{path.basename}}-{{service}}'
      namespace: 'preview-{{path.basename}}'
      labels:
        environment: preview
        pr: '{{path.basename}}'
    spec:
      project: default
      source:
        repoURL: 'https://github.com/Muhammad-Ibra3/platform-engineering-project.git'
        targetRevision: HEAD
        # Root context for the umbrella Helm chart
        path: 'platform-helm/applications'
        helm:
          ignoreMissingValueFiles: true
          valueFiles:
            # Base values per service (e.g. microservices/api-gateway/values.yaml)
            - 'microservices/{{service}}/values.yaml'
            # Per-PR preview overrides from the directory found by the generator (e.g. platform-gitops/envs/preview/pr-123/api-gateway-values.yaml)
            - '../../platform-gitops/envs/preview/{{path.basename}}/{{service}}-values.yaml'
      destination:
        server: 'https://kubernetes.default.svc'
        namespace: 'preview-{{path.basename}}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true