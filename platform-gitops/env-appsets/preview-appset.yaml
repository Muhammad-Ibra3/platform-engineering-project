apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: preview-environments
  namespace: argocd
spec:
  generators:
    - matrix:
        generators:
          - git:
              repoURL: 'https://github.com/Muhammad-Ibra3/platform-engineering-project.git'
              revision: main
              directories:
                # Directories under envs/preview (e.g. preview-123) created by CI update-gitops
                - path: platform-helm/applications/microservices/envs/preview/*
          - list:
              elements:
                - service: api-gateway
                - service: reader
                - service: writer
  template:
    metadata:
      name: '{{path.basename}}-{{service}}'
      namespace: 'preview-{{path.basename}}'
      labels:
        environment: preview
        pr: '{{path.basename}}'
    spec:
      project: default
      source:
        repoURL: 'https://github.com/Muhammad-Ibra3/platform-engineering-project.git'
        targetRevision: HEAD
        path: 'platform-helm/applications'
        helm:
          ignoreMissingValueFiles: true
          valueFiles:
            # Base values per service
            - 'microservices/{{service}}/values.yaml'
            # Preview overrides (e.g. microservices/envs/preview/preview-123/api-gateway-values.yaml)
            - 'microservices/envs/preview/{{path.basename}}/{{service}}-values.yaml'
      destination:
        server: 'https://kubernetes.default.svc'
        namespace: 'preview-{{path.basename}}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true