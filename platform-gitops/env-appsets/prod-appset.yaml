apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: prod-microservices
  namespace: argocd
spec:
  generators:
    - list:
        elements:
          - service: api-gateway
          - service: reader
          - service: writer
  template:
    metadata:
      name: 'prod-{{service}}'
      namespace: prod-microservices
      labels:
        environment: prod
    spec:
      project: default
      source:
        repoURL: 'https://github.com/Muhammad-Ibra3/platform-engineering-project.git'
        targetRevision: HEAD
        path: platform-helm/applications
        helm:
          ignoreMissingValueFiles: true
          valueFiles:
            # Base values per service (e.g. microservices/api-gateway/values.yaml)
            - 'microservices/{{service}}/values.yaml'
            # Prod environment overrides (e.g. microservices/envs/prod/api-gateway-values.yaml)
            - 'microservices/envs/prod/{{service}}-values.yaml'
      destination:
        server: 'https://kubernetes.default.svc'
        namespace: prod-microservices
      syncPolicy:
        automated:
          prune: false 
          selfHeal: true
        syncOptions:
          - CreateNamespace=true