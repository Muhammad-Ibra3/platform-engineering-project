apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-route53-dns01
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  acme:
    email: muhammadibr345@gmail.com
    server: https://acme-v02.api.letsencrypt.org/directory
    privateKeySecretRef:
      name: letsencrypt-route53-dns01-account-key
    solvers:
      - selector:
          dnsZones:
            - myplatformproject.com
        dns01:
          route53:
            region: us-east-1
