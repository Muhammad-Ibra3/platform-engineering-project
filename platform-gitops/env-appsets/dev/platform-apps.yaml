apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: dev-platform-apps
  namespace: argocd
spec:
  goTemplate: true
  generators:
    - list:
        elements:
          - name: cilium
            chartPath: platform-helm/charts/external/cilium
            targetNamespace: kube-system
            valuesPath: platform-helm/envs/dev/platform/cluster-networking/cilium/values.yaml
            syncWave: "0"

          - name: cert-manager
            chartPath: platform-helm/charts/external/cert-manager
            targetNamespace: cert-manager
            valuesPath: platform-helm/envs/dev/platform/ingress/cert-manager/values.yaml
            syncWave: "1"

          - name: traefik
            chartPath: platform-helm/charts/external/traefik
            targetNamespace: ingress
            valuesPath: platform-helm/envs/dev/platform/ingress/traefik/values.yaml
            syncWave: "2"

          - name: external-dns
            chartPath: platform-helm/charts/external/external-dns
            targetNamespace: external-dns
            valuesPath: platform-helm/envs/dev/platform/dns/external-dns/values.yaml
            syncWave: "3"

          - name: vault
            chartPath: platform-helm/charts/external/vault
            targetNamespace: secrets
            valuesPath: platform-helm/envs/dev/platform/secrets/vault/values.yaml
            syncWave: "0"

          - name: keycloak
            chartPath: platform-helm/charts/external/keycloak
            targetNamespace: identity
            valuesPath: platform-helm/envs/dev/platform/identity/keycloak/values.yaml
            syncWave: "3"

          # - name: kyverno
          #   chartPath: platform-helm/charts/external/kyverno
          #   targetNamespace: security
          #   valuesPath: platform-helm/envs/dev/platform/security/kyverno/values.yaml
          #   syncWave: "3"
          #
          # TODO: Configure Kyverno deployment and apply Kyverno policies.
          #       - Kyverno policies are located at: platform-security/kyverno
          #       - The Argo ApplicationSet manifest for these policies is at: platform-gitops/env-appsets/dev/policy-apps.yaml

          - name: falco
            chartPath: platform-helm/charts/external/falco
            targetNamespace: security
            valuesPath: platform-helm/envs/dev/platform/security/falco/values.yaml
            syncWave: "3"

          - name: prometheus
            chartPath: platform-helm/charts/external/prometheus
            targetNamespace: observability
            valuesPath: platform-helm/envs/dev/platform/observability/prometheus/values.yaml
            syncWave: "4"

          - name: loki
            chartPath: platform-helm/charts/external/loki
            targetNamespace: observability
            valuesPath: platform-helm/envs/dev/platform/observability/loki/values.yaml
            syncWave: "4"

          - name: grafana
            chartPath: platform-helm/charts/external/grafana
            targetNamespace: observability
            valuesPath: platform-helm/envs/dev/platform/observability/grafana/values.yaml
            syncWave: "4"

          - name: kubecost
            chartPath: platform-helm/charts/external/kubecost
            targetNamespace: finops
            valuesPath: platform-helm/envs/dev/platform/finops/kubecost/values.yaml
            syncWave: "5"

  template:
    metadata:
      name: 'dev-{{.name}}'
      namespace: argocd
      labels:
        environment: dev
        tier: platform
      annotations:
        argocd.argoproj.io/sync-wave: '{{.syncWave}}'

    spec:
      project: default

      source:
        repoURL: 'https://github.com/Muhammad-Ibra3/platform-engineering-project.git'
        targetRevision: main
        path: '{{.chartPath}}'
        helm:
          releaseName: '{{.name}}'
          valueFiles:
            - '../../../../{{.valuesPath}}'

      destination:
        server: 'https://kubernetes.default.svc'
        namespace: '{{.targetNamespace}}'

      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        retry:
          limit: 3
          backoff:
            duration: 5s
            factor: 2
            maxDuration: 2m
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true