apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: reader
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/Muhammad-Ibra3/platform-engineering-project.git'
    targetRevision: HEAD
    path: platform-helm/applications
    helm:
      valueFiles:
        - microservices/reader/values.yaml
        - microservices/envs/prod/reader-values.yaml
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: microservices
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
