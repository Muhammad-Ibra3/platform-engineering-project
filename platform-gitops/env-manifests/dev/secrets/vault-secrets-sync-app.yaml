apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: dev-vault-secrets-sync
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  project: default
  source:
    repoURL: https://github.com/Muhammad-Ibra3/platform-engineering-project.git
    targetRevision: main
    path: platform-gitops/env-manifests/dev/secrets/vault-sync
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: secrets
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
