apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: postgresql-auth
  namespace: database
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-backend
  target:
    name: postgresql-auth
    creationPolicy: Owner
  data:
    - secretKey: postgres-password
      remoteRef:
        key: dev/database/postgresql-auth
        property: postgres-password
    - secretKey: password
      remoteRef:
        key: dev/database/postgresql-auth
        property: password
---
