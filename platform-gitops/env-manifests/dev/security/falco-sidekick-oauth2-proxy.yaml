apiVersion: apps/v1
kind: Deployment
metadata:
  name: falco-sidekick-oauth2-proxy
  namespace: security
spec:
  replicas: 1
  selector:
    matchLabels:
      app: falco-sidekick-oauth2-proxy
  template:
    metadata:
      labels:
        app: falco-sidekick-oauth2-proxy
    spec:
      containers:
        - name: oauth2-proxy
          image: quay.io/oauth2-proxy/oauth2-proxy:v7.8.1
          args:
            - --provider=oidc
            - --oidc-issuer-url=https://keycloak.dev.myplatformproject.com/realms/platform
            - --email-domain=*
            - --upstream=http://falco-ui.security.svc.cluster.local:2802
            - --http-address=0.0.0.0:4180
            - --redirect-url=https://falco-sidekick.dev.myplatformproject.com/oauth2/callback
            - --cookie-secure=true
            - --cookie-samesite=lax
            - --set-xauthrequest=true
            - --scope=openid profile email groups
          envFrom:
            - secretRef:
                name: falco-sidekick-oauth2-proxy
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
          ports:
            - containerPort: 4180
              name: http
---
apiVersion: v1
kind: Service
metadata:
  name: falco-sidekick-oauth2-proxy
  namespace: security
spec:
  selector:
    app: falco-sidekick-oauth2-proxy
  ports:
    - port: 80
      targetPort: http
      protocol: TCP
      name: http
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: falco-sidekick-oauth2-proxy
  namespace: security
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-route53-dns01
    external-dns.alpha.kubernetes.io/target: "18.234.67.136"
spec:
  ingressClassName: traefik
  tls:
    - secretName: falco-sidekick-dev-myplatformproject-com-tls
      hosts:
        - falco-sidekick.dev.myplatformproject.com
  rules:
    - host: falco-sidekick.dev.myplatformproject.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: falco-sidekick-oauth2-proxy
                port:
                  number: 80
