name: Push And Sign Image

on:
  workflow_call:
    inputs:
      service:
        required: true
        type: string
      image_tag:
        required: false
        type: string
        default: ${{ github.sha }}
      image_artifact:
        required: true
        type: string
    outputs:
      image_ref:
        description: Fully qualified pushed image reference
        value: ${{ jobs.push.outputs.image_ref }}
    secrets:
      AWS_ROLE:
        required: true
      ECR_REGISTRY:
        required: true

jobs:
  push:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    outputs:
      image_ref: ${{ steps.meta.outputs.image_ref }}

    steps:
      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.image_artifact }}
          path: .

      - name: Load image
        shell: bash
        run: |
          set -euo pipefail
          docker load -i image.tar

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE }}
          aws-region: us-east-1

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Resolve image reference
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          image_ref="${{ secrets.ECR_REGISTRY }}/${{ inputs.service }}:${{ inputs.image_tag }}"
          echo "image_ref=$image_ref" >> "$GITHUB_OUTPUT"

      - name: Tag image for ECR
        shell: bash
        run: |
          set -euo pipefail
          docker tag \
            "local/${{ inputs.service }}:${{ inputs.image_tag }}" \
            "${{ steps.meta.outputs.image_ref }}"

      - name: Push image
        shell: bash
        run: |
          set -euo pipefail
          docker push "${{ steps.meta.outputs.image_ref }}"

      - name: Install Cosign
        uses: sigstore/cosign-installer@v4.1.0
        with:
          cosign-release: v3.0.5

      - name: Sign pushed image with Cosign keyless
        env:
          COSIGN_YES: "true"
        shell: bash
        run: |
          set -euo pipefail
          cosign sign "${{ steps.meta.outputs.image_ref }}"