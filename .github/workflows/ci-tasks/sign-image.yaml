name: Sign Image

on:
  workflow_call:
    inputs:
      image_artifact:
        required: true
        type: string

jobs:
  sign:
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
    - name: Download image artifact
      uses: actions/download-artifact@v4
      with:
        name: ${{ inputs.image_artifact }}
        path: .

    - name: Install Cosign
      uses: sigstore/cosign-installer@v3
      with:
        cosign-release: "v2.4.1"

    - name: Sign image tarball with Cosign (keyless)
      env:
        COSIGN_EXPERIMENTAL: "1"
      run: |
        cosign sign-blob --yes --bundle cosign.bundle image.tar

    - name: Upload Cosign bundle
      uses: actions/upload-artifact@v4
      with:
        name: cosign-bundle-${{ inputs.image_artifact }}
        path: cosign.bundle
