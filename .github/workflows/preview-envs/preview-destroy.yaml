name: Remove Preview GitOps

on:
  workflow_call:

    inputs:
      pr_number:
        required: true
        type: string

jobs:

  cleanup:

    runs-on: ubuntu-latest

    steps:

    - uses: actions/checkout@v4
      with:
        repository: your-org/platform-engineering-project
        token: ${{ secrets.GH_TOKEN }}

    - name: Remove preview
      run: |

        rm -rf platform-gitops/previews/pr-${{ inputs.pr_number }}

    - name: Commit
      run: |

        git config user.name github-actions
        git config user.email actions@github.com

        git commit -am "remove preview env pr-${{ inputs.pr_number }}"
        git push