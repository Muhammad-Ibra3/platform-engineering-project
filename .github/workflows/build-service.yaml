name: Build Service

on:
  workflow_call:
    inputs:
      service:
        required: true
        type: string
      image_tag:
        required: false
        type: string
        default: ${{ github.sha }}
    outputs:
      image:
        value: ${{ jobs.build.outputs.image }}
      image_artifact:
        value: ${{ jobs.build.outputs.image_artifact }}

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.meta.outputs.image }}
      image_artifact: ${{ steps.meta.outputs.image_artifact }}

    steps:
      - uses: actions/checkout@v4

      - name: Resolve service directory and image metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          service="${{ inputs.service }}"
          case "$service" in
            api-gateway) service_dir="api_gateway_service" ;;
            reader) service_dir="reader_service" ;;
            writer) service_dir="writer_service" ;;
            *)
              echo "Unsupported service: $service"
              exit 1
              ;;
          esac

          image="local/${service}:${{ inputs.image_tag }}"
          image_artifact="image-${service}-${{ inputs.image_tag }}"

          echo "service_dir=$service_dir" >> "$GITHUB_OUTPUT"
          echo "image=$image" >> "$GITHUB_OUTPUT"
          echo "image_artifact=$image_artifact" >> "$GITHUB_OUTPUT"

      - name: Build image
        shell: bash
        run: |
          set -euo pipefail
          docker build \
            -f "${{ steps.meta.outputs.service_dir }}/Dockerfile" \
            -t "${{ steps.meta.outputs.image }}" \
            .

      - name: Save image
        shell: bash
        run: |
          set -euo pipefail
          docker save "${{ steps.meta.outputs.image }}" -o image.tar

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.meta.outputs.image_artifact }}
          path: image.tar