name: Update GitOps

on:
  workflow_call:
    inputs:
      service:
        required: false
        type: string
        description: Single changed service
      services:
        required: false
        type: string
        description: JSON array of service names, e.g. ["api-gateway","reader","writer"]
      image_tag:
        required: true
        type: string
      pr_number:
        required: true
        type: string
        description: PR number used for platform-helm/envs/preview/microservices/preview-<pr>/
      gitops_repo:
        required: true
        type: string
        description: Repository containing GitOps manifests
    secrets:
      GH_TOKEN:
        required: true
      ECR_REGISTRY:
        required: true

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Resolve preview metadata
        shell: bash
        run: |
          set -euo pipefail

          PR_NUM="${{ inputs.pr_number }}"
          PREVIEW_DIR="platform-helm/envs/preview/microservices/preview-${PR_NUM}"

          echo "PR_NUM=$PR_NUM" >> "$GITHUB_ENV"
          echo "PREVIEW_DIR=$PREVIEW_DIR" >> "$GITHUB_ENV"

      - name: Checkout GitOps repo
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.gitops_repo }}
          token: ${{ secrets.GH_TOKEN }}
          ref: main
          fetch-depth: 0

      - name: Install jq
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Install yq
        uses: mikefarah/yq@v4.44.3

      - name: Create preview dir and values from dev overrides
        shell: bash
        env:
          TAG: ${{ inputs.image_tag }}
          PR_NUM: ${{ env.PR_NUM }}
          ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
        run: |
          set -euo pipefail

          DEV_DIR="platform-helm/envs/dev/applications/microservices"
          mkdir -p "$PREVIEW_DIR"

          services_payload='${{ inputs.services }}'
          if [ -z "$services_payload" ]; then
            if [ -n '${{ inputs.service }}' ]; then
              services_payload='["${{ inputs.service }}"]'
            else
              services_payload='[]'
            fi
          fi

          echo "$services_payload" | jq -e 'type == "array"' >/dev/null

          map_to_helm() {
            case "$1" in
              api_gateway|api-gateway|apigateway) echo "api-gateway" ;;
              reader) echo "reader" ;;
              writer) echo "writer" ;;
              *) echo "$1" ;;
            esac
          }

          while read -r raw_service; do
            [ -z "$raw_service" ] && continue
            service="$(map_to_helm "$raw_service")"

            case "$service" in
              api-gateway|reader|writer) ;;
              *)
                echo "Unsupported service: $service"
                exit 1
                ;;
            esac

            IMAGE_REPO="${ECR_REGISTRY}/${{ inputs.service }}" # TODO: add the repository name here

            src="${DEV_DIR}/${service}-values.yaml"
            dst="${PREVIEW_DIR}/${service}-values.yaml"

            if [ -f "$src" ]; then
              cp "$src" "$dst"
            else
              printf 'image:\n  tag: "%s"\n' "$TAG" > "$dst"
            fi

            yq -i '.image.repository = strenv(IMAGE_REPO)' "$dst"
            yq -i '.image.tag = strenv(TAG)' "$dst"

            if [ "$service" = "api-gateway" ]; then
              export PREVIEW_HOST="api.preview-${PR_NUM}.dev.example.local"
              yq -i '
                .ingress.enabled = true |
                .ingress.hosts = [{"host": strenv(PREVIEW_HOST), "paths": [{"path": "/", "pathType": "Prefix"}]}]
              ' "$dst"
            fi
          done < <(echo "$services_payload" | jq -r '.[]')

      - name: Commit and push
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add "$PREVIEW_DIR/"

          if git diff --staged --quiet; then
            echo "No changes detected to commit."
            exit 0
          fi

          git commit -m "Add/update preview env ${PR_NUM} for image ${{ inputs.image_tag }} [skip ci]"
          git pull --rebase origin main
          git push origin HEAD:main